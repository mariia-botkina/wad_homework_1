<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LLM Chat</title>
    <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
    <!-- Auth View -->
    <div id="auth-view" class="auth-container hidden">
        <div class="auth-box">
            <div class="auth-logo">
                <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
                    <circle cx="20" cy="20" r="20" fill="#10a37f"/>
                    <path d="M13 20a7 7 0 1 1 14 0 7 7 0 0 1-14 0z" fill="white"/>
                </svg>
                <h1>LLM Chat</h1>
            </div>
            <div class="auth-tabs">
                <button class="tab-btn active" data-tab="login">Login</button>
                <button class="tab-btn" data-tab="register">Register</button>
            </div>
            <div id="login-form" class="auth-form">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="login-username" placeholder="Enter username" autocomplete="username"/>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" placeholder="Enter password" autocomplete="current-password"/>
                </div>
                <div id="login-error" class="error-msg hidden"></div>
                <button class="btn-primary" id="login-btn">Sign In</button>
                <div class="divider"><span>or</span></div>
                <a href="/api/auth/github" class="btn-github">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
                    </svg>
                    Continue with GitHub
                </a>
            </div>
            <div id="register-form" class="auth-form hidden">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="reg-username" placeholder="Choose a username" autocomplete="username"/>
                </div>
                <div class="form-group">
                    <label>Email (optional)</label>
                    <input type="email" id="reg-email" placeholder="Enter email" autocomplete="email"/>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="reg-password" placeholder="Choose a password" autocomplete="new-password"/>
                </div>
                <div id="reg-error" class="error-msg hidden"></div>
                <button class="btn-primary" id="register-btn">Create Account</button>
                <div class="divider"><span>or</span></div>
                <a href="/api/auth/github" class="btn-github">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
                    </svg>
                    Continue with GitHub
                </a>
            </div>
        </div>
    </div>

    <!-- Chat View -->
    <div id="chat-view" class="chat-layout hidden">
        <aside class="sidebar">
            <div class="sidebar-header">
                <button class="btn-new-chat" id="new-chat-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                    New Chat
                </button>
            </div>
            <div class="chat-list" id="chat-list"></div>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar" id="user-avatar">U</div>
                    <span id="username-display"></span>
                </div>
                <button class="btn-logout" id="logout-btn" title="Logout">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                </button>
            </div>
        </aside>

        <main class="chat-main">
            <div id="empty-state" class="empty-state">
                <div class="empty-icon">
                    <svg width="64" height="64" viewBox="0 0 40 40" fill="none">
                        <circle cx="20" cy="20" r="20" fill="#10a37f" opacity="0.2"/>
                        <path d="M13 20a7 7 0 1 1 14 0 7 7 0 0 1-14 0z" fill="#10a37f"/>
                    </svg>
                </div>
                <h2>How can I help you today?</h2>
                <p>Start a new conversation or select an existing chat</p>
                <button class="btn-primary" id="start-chat-btn">Start New Chat</button>
            </div>
            <div id="chat-window" class="chat-window hidden">
                <div class="chat-header">
                    <h2 id="chat-title">Chat</h2>
                    <button class="btn-icon" id="delete-chat-btn" title="Delete chat">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="3 6 5 6 21 6"/>
                            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                            <path d="M10 11v6M14 11v6"/>
                            <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
                        </svg>
                    </button>
                </div>
                <div class="messages-container" id="messages-container"></div>
                <div class="message-input-area">
                    <div class="input-wrapper">
                        <textarea
                            id="message-input"
                            placeholder="Message LLM Chat..."
                            rows="1"
                        ></textarea>
                        <button class="btn-send" id="send-btn" disabled>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                                <line x1="12" y1="19" x2="12" y2="5"/>
                                <polyline points="5 12 12 5 19 12"/>
                            </svg>
                        </button>
                    </div>
                    <p class="input-hint">LLM Chat may produce inaccurate information.</p>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
